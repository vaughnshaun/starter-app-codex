name: Mobile Auth Scaffold

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 22
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run typecheck

  supabase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.78.1
      - run: supabase start
      - run: supabase db reset
      - run: supabase db lint
      - run: supabase test db supabase/tests/profiles_rls.sql

